# Action Culture - Stack de développement
# Usage: docker compose up -d
# Frontend (page web): http://localhost:8080
# API Backend: http://localhost:3001

services:
  # Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: dz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: actionculture
      MYSQL_USER: actionculture
      MYSQL_PASSWORD: actionculture
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Redis (cache / rate limiting)
  redis:
    image: redis:7-alpine
    container_name: dz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dz-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    # Optionnel : décommenter si vous avez un fichier .env dans backend/
    # env_file:
    #   - ./backend/.env
    environment:
      NODE_ENV: development
      # Générer un secret en prod : node scripts/generateSecret.js
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-min-32-chars}
      PORT: 3001
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: actionculture
      DB_USER: actionculture
      DB_PASSWORD: actionculture
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      USE_REDIS_MEMORY: "false"
      API_URL: http://localhost:3001
      FRONTEND_URL: http://localhost:8080
      BASE_URL: http://localhost:3001
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Frontend React (Vite dev server) - dossier frontEnd (camelCase)
  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
    container_name: dz-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Proxy API : cible le backend dans Docker
      VITE_PROXY_TARGET: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  mysql_data:
