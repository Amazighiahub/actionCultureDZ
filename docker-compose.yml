# ============================================
# Docker Compose - EventCulture (DEVELOPPEMENT)
# ============================================
# ATTENTION : Ce fichier est pour le DEVELOPPEMENT LOCAL uniquement.
# Pour la PRODUCTION, utiliser : docker-compose.prod.yml
#
# Usage dev : docker compose up -d
# ============================================

services:
  # ==========================================
  # Backend API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventculture-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - REDIS_HOST=redis
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: eventculture-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: eventculture-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_NAME:-actionculture}
      - MYSQL_USER=${DB_USER:-actionculture_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: eventculture-redis
    restart: unless-stopped
    # Port non exposé à l'hôte - accessible uniquement via le réseau Docker interne
    # Le backend se connecte via REDIS_HOST=redis (nom de service Docker)
    volumes:
      - redis_data:/data
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_dev_password}

# ==========================================
# Networks
# ==========================================
networks:
  eventculture-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
