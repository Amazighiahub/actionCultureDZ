# ============================================
# Docker Compose PRODUCTION - EventCulture
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  # ==========================================
  # Nginx Reverse Proxy + SSL
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: eventculture-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - frontend_build:/usr/share/nginx/html:ro
      - backend_uploads:/var/www/uploads:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================
  # Backend API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: eventculture-backend
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DIALECT=mysql
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - USE_REDIS_MEMORY=false
      - FRONTEND_URL=${FRONTEND_URL}
      - API_URL=${API_URL}
      - BASE_URL=${API_URL}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_PAUSED=${EMAIL_PAUSED:-false}
      - BCRYPT_ROUNDS=12
      - UPLOAD_MAX_SIZE=10485760
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================
  # Frontend (build only - served by nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: eventculture-frontend
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - frontend_build:/usr/share/nginx/html
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: eventculture-mysql
    restart: unless-stopped
    # PAS de ports exposes a l'exterieur (securite)
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=100
      --innodb-buffer-pool-size=256M
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: eventculture-redis
    restart: unless-stopped
    # PAS de ports exposes a l'exterieur (securite)
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - eventculture-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production}
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  # ==========================================
  # Backup automatique (cron chaque nuit 3h)
  # ==========================================
  backup:
    image: mysql:8.0
    container_name: eventculture-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
      - backend_uploads:/app/uploads:ro
    environment:
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME}
      - DB_USER=root
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_started
    networks:
      - eventculture-network
    entrypoint: >
      /bin/bash -c '
        chmod +x /backup.sh;
        echo "Backup service started — next run at 03:00";
        while true; do
          NEXT=$(date -d "tomorrow 03:00" +%s 2>/dev/null || date -d "03:00" +%s);
          NOW=$(date +%s);
          SLEEP=$((NEXT - NOW));
          if [ $$SLEEP -le 0 ]; then SLEEP=86400; fi;
          echo "[backup] Sleeping $$SLEEP seconds until next run...";
          sleep $$SLEEP;
          echo "[backup] Starting backup at $$(date)";
          /backup.sh;
        done
      '
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ==========================================
  # Certbot (SSL auto-renewal)
  # ==========================================
  certbot:
    image: certbot/certbot
    container_name: eventculture-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

# ==========================================
# Networks
# ==========================================
networks:
  eventculture-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  frontend_build:
    driver: local
  backup_data:
    driver: local
  certbot_webroot:
    driver: local
  certbot_certs:
    driver: local
