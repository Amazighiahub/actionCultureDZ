# ============================================
# Nginx INITIAL - EventCulture
# ============================================
# Configuration TEMPORAIRE pour le premier deploiement
# AVANT d'avoir obtenu le certificat SSL.
#
# Etapes :
#   1. Deployer avec ce fichier (copier vers prod.conf)
#   2. Obtenir le certificat SSL avec Certbot
#   3. Remplacer par le vrai prod.conf
# ============================================

upstream backend_api {
    server backend:3001;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API
    location /api {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # Uploads
    location /uploads {
        proxy_pass http://backend_api;
    }

    # Frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
