# ============================================
# Nginx Production - EventCulture
# ============================================
# Reverse proxy securise : SSL + headers + rate limiting
# ============================================

# Masquer la version de nginx
server_tokens off;

# Rate limiting : 30 requetes/seconde par IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/s;

# Upstream backend
upstream backend_api {
    server backend:3001;
    keepalive 32;
}

# Upstream frontend
upstream frontend_app {
    server frontend:80;
}

# ============================================
# Redirection HTTP -> HTTPS
# ============================================
server {
    listen 80;
    server_name _;

    # Certbot challenge (necessaire pour obtenir le certificat)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (pour Docker healthcheck)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Tout le reste -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# Redirection www vers non-www
server {
    listen 443 ssl http2;
    server_name www.taladz.com;
    ssl_certificate /etc/letsencrypt/live/taladz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taladz.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 301 https://taladz.com$request_uri;
}

# ============================================
# HTTPS - Site principal (Frontend + API)
# ============================================
# Un SEUL bloc server pour `taladz.com` (+ www redirigé plus haut).
# Auparavant deux blocs 443 se chevauchaient : nginx servait le premier
# qui matchait et ignorait les directives critiques du second
# (client_max_body_size 100M, rate-limit login, /uploads, etc.).
# ============================================
server {
    listen 443 ssl http2;
    server_name taladz.com www.taladz.com;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/taladz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taladz.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    charset utf-8;

    # Taille max du body (uploads vidéo/image). S'applique à TOUTES les locations.
    client_max_body_size 100M;

    # --- Compression Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml font/woff2;

    # Bloquer les fichiers sensibles (dotfiles : .env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Fichiers uploadés servis directement par nginx via volume partagé
    # (évite de passer par Node pour les assets statiques)
    location /uploads {
        alias /var/www/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Bloquer l'exécution de scripts hébergés involontairement
        location ~* \.(php|jsp|asp|sh|cgi|py)$ {
            deny all;
        }
    }

    # Rate limiting strict sur l'authentification (doit être déclaré AVANT /api
    # pour que la regex match en priorité sur les prefix match).
    location ~ ^/api/(users/(login|register|refresh-token|check-email)|email-verification/(request-password-reset|reset-password)) {
        limit_req zone=login_limit burst=15 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Les headers de sécurité (CSP, HSTS, etc.) sont gérés par Helmet
        # côté Node. Ne pas les (re)définir ici sinon nginx masquerait ceux
        # du backend (règle : add_header dans une location annule ceux hérités).
    }

    # Uploads (toutes routes /api/upload/*) : timeouts étendus à 5 min
    location ~ ^/api/upload {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # API Backend (général)
    location /api {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check direct backend
    location = /health {
        access_log off;
        proxy_pass http://backend_api;
    }

    # Cache des assets statiques frontend (re-inclure security headers car
    # add_header dans une location masque ceux du parent)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_app;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # Frontend (HTML/SPA)
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers de sécurité appliqués au HTML/SPA uniquement
        # (les réponses /api ont leur propre CSP stricte via Helmet)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com https://res.cloudinary.com https://ui-avatars.com; connect-src 'self' https://nominatim.openstreetmap.org; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://www.dailymotion.com https://w.soundcloud.com; object-src 'none'; base-uri 'self'; upgrade-insecure-requests" always;
    }
}
