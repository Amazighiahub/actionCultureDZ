# ============================================
# Nginx Production - EventCulture
# ============================================
# Reverse proxy securise : SSL + headers + rate limiting
# ============================================

# Masquer la version de nginx
server_tokens off;

# Rate limiting : 10 requetes/seconde par IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;

# Upstream backend
upstream backend_api {
    server backend:3001;
    keepalive 32;
}

# Upstream frontend
upstream frontend_app {
    server frontend:80;
}

# ============================================
# Redirection HTTP -> HTTPS
# ============================================
server {
    listen 80;
    server_name _;

    # Certbot challenge (necessaire pour obtenir le certificat)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (pour Docker healthcheck)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Tout le reste -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# Redirection www vers non-www
server {
    listen 443 ssl http2;
    server_name www.echoalgerie.com;
    ssl_certificate /etc/letsencrypt/live/echoalgerie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echoalgerie.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 301 https://echoalgerie.com$request_uri;
}

# HTTPS - Site principal (Frontend)
# ============================================
server {
    listen 443 ssl http2;
    # ⚠️ REMPLACER par votre vrai domaine si différent
    server_name echoalgerie.com www.echoalgerie.com;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/echoalgerie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echoalgerie.com/privkey.pem;

    # SSL securise (TLS 1.2+ uniquement)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Headers de securite ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # --- Compression Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml font/woff2;

    # --- Frontend (fichiers statiques) ---
    # API Backend
    location /api {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin https://echoalgerie.com;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache des assets statiques (re-inclure security headers car add_header remplace le parent)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_app;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }
}

# ============================================
# HTTPS - API Backend
# ============================================
server {
    listen 443 ssl http2;
    server_name echoalgerie.com;

    # --- SSL (meme certificat) ---
    ssl_certificate /etc/letsencrypt/live/echoalgerie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echoalgerie.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_tickets off;

    # --- Headers de securite ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Taille max des uploads (100 Mo)
    client_max_body_size 100M;

    # --- Rate limiting sur l'API ---
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Uploads : timeout étendu (5 min) pour les gros fichiers
    location ~ ^/api/.*/upload {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Rate limiting strict sur login/register
    location ~ ^/api/(auth|login|register) {
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fichiers uploades
    location /uploads {
        alias /var/www/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Bloquer l'execution de scripts dans les uploads
        location ~* \.(php|jsp|asp|sh|cgi|py)$ {
            deny all;
        }
    }

    # Health check
    location /health {
        access_log off;
        proxy_pass http://backend_api;
    }

    # Bloquer les fichiers sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
