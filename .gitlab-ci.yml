# ============================================
# GitLab CI/CD - EventCulture
# ============================================
# Pipeline : Test -> Deploy
#
# Variables a configurer dans GitLab CI/CD Settings :
#   SSH_PRIVATE_KEY  : cle privee SSH (type: File)
#   SERVER_IP        : IP du VPS OVH
#   SERVER_USER      : utilisateur SSH (ex: deploy)
#   DOMAIN           : nom de domaine (ex: taladz.com)
# ============================================

stages:
  - test
  - deploy

variables:
  NODE_VERSION: "20"

# ============================================
# Templates reutilisables
# ============================================
.node_template: &node_template
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - backend/node_modules/
      - frontEnd/node_modules/

.ssh_template: &ssh_template
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null

# ============================================
# Stage: TEST
# ============================================
# Les etapes critiques (lint, tests, audit) DOIVENT etre bloquantes :
# un echec fait echouer le job et bloque le deploiement.
#
# Pour tolerer temporairement un warning npm audit, utiliser
# allow_failure: true sur le job plutot que masquer avec `|| echo`.
# ============================================
test:backend:
  <<: *node_template
  stage: test
  script:
    - cd backend
    - npm ci
    - npm run lint
    # test:ci exclut les suites qui requierent MySQL/Redis
    # (voir backend/jest.ci.config.js).
    # TODO : quand on ajoutera `services: [mysql:8, redis:7]` + migrations,
    # repasser a `npm test -- --passWithNoTests`.
    - npm run test:ci
    - npm audit --audit-level=high --omit=dev
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:frontend:
  <<: *node_template
  stage: test
  script:
    - cd frontEnd
    - npm ci
    - npm run lint
    - npm test -- --run --passWithNoTests
    - npm run build
    - npm audit --audit-level=high --omit=dev
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ============================================
# Stage: DEPLOY Production (branche main)
# ============================================
# Declenche manuellement uniquement ET seulement si test:* passent.
# ============================================
deploy:production:
  <<: *ssh_template
  stage: deploy
  needs:
    - test:backend
    - test:frontend
  script:
    - |
      ssh "$SERVER_USER@$SERVER_IP" << 'DEPLOY_SCRIPT'
        set -e
        echo "=== Deploiement Production ==="

        cd /home/EventCulture
        git fetch origin main
        git checkout main
        git pull origin main

        # Deployer avec Docker
        ./scripts/deploy.sh

        echo "=== Deploiement termine ==="
      DEPLOY_SCRIPT
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: https://$DOMAIN

# ============================================
# Stage: DEPLOY Staging (branche develop)
# ============================================
# Manuel egalement : evite qu'un push develop deploie automatiquement
# un code qui n'a pas encore ete valide sur staging.
# ============================================
deploy:staging:
  <<: *ssh_template
  stage: deploy
  needs:
    - test:backend
    - test:frontend
  script:
    - |
      ssh "$SERVER_USER@$SERVER_IP" << 'DEPLOY_SCRIPT'
        set -e
        echo "=== Deploiement Staging ==="

        cd /home/EventCulture
        git fetch origin develop
        git checkout develop
        git pull origin develop

        ./scripts/deploy.sh

        echo "=== Staging deploye ==="
      DEPLOY_SCRIPT
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
  environment:
    name: staging
    url: http://$SERVER_IP
