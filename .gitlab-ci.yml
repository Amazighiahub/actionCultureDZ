# ============================================
# GitLab CI/CD - EventCulture
# ============================================
# Pipeline : Test -> Build -> Deploy
#
# Variables a configurer dans GitLab CI/CD Settings :
#   SSH_PRIVATE_KEY  : cle privee SSH (type: File)
#   SERVER_IP        : IP du VPS OVH
#   SERVER_USER      : utilisateur SSH (ex: deploy)
#   DOMAIN           : nom de domaine (ex: eventculture.com)
# ============================================

stages:
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"

# ============================================
# Templates reutilisables
# ============================================
.node_template: &node_template
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - backend/node_modules/
      - frontEnd/node_modules/

.ssh_template: &ssh_template
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null

# ============================================
# Stage: TEST
# ============================================
test:backend:
  <<: *node_template
  stage: test
  script:
    - cd backend
    - npm ci
    - npm run lint 2>/dev/null || echo "Lint skipped"
    - npm test -- --passWithNoTests 2>/dev/null || echo "Tests skipped"
    - npm audit --audit-level=high 2>/dev/null || echo "Audit warnings"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:frontend:
  <<: *node_template
  stage: test
  script:
    - cd frontEnd
    - npm ci
    - npm run lint 2>/dev/null || echo "Lint skipped"
    - npm run build
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ============================================
# Stage: DEPLOY Production (branche main)
# ============================================
deploy:production:
  <<: *ssh_template
  stage: deploy
  script:
    - |
      ssh "$SERVER_USER@$SERVER_IP" << 'DEPLOY_SCRIPT'
        set -e
        echo "=== Deploiement Production ==="

        cd /home/EventCulture
        git fetch origin main
        git checkout main
        git pull origin main

        # Deployer avec Docker
        ./scripts/deploy.sh

        echo "=== Deploiement termine ==="
      DEPLOY_SCRIPT
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: https://$DOMAIN

# ============================================
# Stage: DEPLOY Staging (branche develop)
# ============================================
deploy:staging:
  <<: *ssh_template
  stage: deploy
  script:
    - |
      ssh "$SERVER_USER@$SERVER_IP" << 'DEPLOY_SCRIPT'
        set -e
        echo "=== Deploiement Staging ==="

        cd /home/EventCulture
        git fetch origin develop
        git checkout develop
        git pull origin develop

        ./scripts/deploy.sh

        echo "=== Staging deploye ==="
      DEPLOY_SCRIPT
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  environment:
    name: staging
    url: http://$SERVER_IP
