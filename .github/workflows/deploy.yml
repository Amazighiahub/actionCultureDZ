name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  # ============================================
  # Job 1 : Tests backend (lint + unit + audit)
  # Bloquant : un echec empeche le deploiement.
  # ============================================
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      # test:ci exclut les suites qui requierent MySQL/Redis
      # (voir backend/jest.ci.config.js).
      # TODO : quand on branchera des services mysql:8 + redis:7 au runner
      # et qu'on lancera les migrations, repasser a `npm test`.
      - name: Test backend
        working-directory: ./backend
        run: npm run test:ci

      - name: Audit backend (high/critical)
        working-directory: ./backend
        run: npm audit --audit-level=high --omit=dev

  # ============================================
  # Job 2 : Tests frontend (lint + unit + build + audit)
  # ============================================
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontEnd/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontEnd
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontEnd
        run: npm run lint

      - name: Test frontend
        working-directory: ./frontEnd
        run: npm test -- --run --passWithNoTests

      - name: Build frontend
        working-directory: ./frontEnd
        run: npm run build

      - name: Audit frontend (high/critical)
        working-directory: ./frontEnd
        run: npm audit --audit-level=high --omit=dev

  # ============================================
  # Job 3 : Deploiement sur VPS
  # Depend explicitement des tests : impossible de deployer sans barriere.
  # ============================================
  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/actionCultureDZ
            sudo git pull origin main
            sudo docker compose -f docker-compose.prod.yml stop frontend nginx
            sudo docker volume rm -f actionculturedz_frontend_build
            sudo docker compose -f docker-compose.prod.yml build --no-cache frontend backend
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate
            sudo docker image prune -f
