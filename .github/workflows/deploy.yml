name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  # ============================================
  # Job 1 : Audit de sécurité des dépendances
  # ============================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high --omit=dev || true

      - name: Audit frontend dependencies
        working-directory: ./frontEnd
        run: npm audit --audit-level=high --omit=dev || true

  # ============================================
  # Job 2 : Déploiement sur VPS (après audit)
  # ============================================
  deploy:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/actionCultureDZ
            sudo git pull origin main
            sudo docker compose -f docker-compose.prod.yml stop frontend nginx
            sudo docker volume rm -f actionculturedz_frontend_build
            sudo docker compose -f docker-compose.prod.yml build --no-cache frontend backend
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate
            sudo docker image prune -f
